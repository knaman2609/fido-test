<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockNote Editor</title>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "@blocknote/core": "https://esm.sh/@blocknote/core@0.15.11",
        "@blocknote/mantine": "https://esm.sh/@blocknote/mantine@0.15.11"
      }
    }
    </script>
    <link rel="stylesheet" href="https://esm.sh/@blocknote/mantine@0.15.11/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        #editor-container {
            height: 100vh;
            display: flex;
            flex-direction: row;
        }

        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .new-note-btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-note-btn:hover {
            background: #0056CC;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .note-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            border-left: 3px solid transparent;
            transition: background 0.15s;
        }

        .note-item:hover {
            background: #f0f0f0;
        }

        .note-item.active {
            background: #e3f2fd;
            border-left: 3px solid #007AFF;
        }

        .note-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-preview {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .note-date {
            font-size: 12px;
            color: #999;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .editor-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .editor-header h1 {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }

        .save-status {
            font-size: 14px;
            color: #666;
        }

        .save-status.saved {
            color: #4CAF50;
        }

        .save-status.error {
            color: #f44336;
        }

        #editor {
            flex: 1;
            background: white;
            overflow-y: auto;
        }

        .bn-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <div id="editor-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Notes</h2>
                <button class="new-note-btn" id="newNoteBtn">New Note</button>
            </div>
            <div class="notes-list" id="notesList"></div>
        </div>
        <div class="main-content">
            <div class="editor-header">
                <h1>BlockNote Editor</h1>
                <span id="saveStatus" class="save-status">Ready</span>
            </div>
            <div id="editor"></div>
        </div>
    </div>

    <script type="module" src="dist/main.js"></script>
</body>
</html>
