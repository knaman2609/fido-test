<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockNote Editor</title>

    <script type="importmap">
    {
      "imports": {
        "@blocknote/core": "https://esm.sh/@blocknote/core@0.15.11",
        "@blocknote/mantine": "https://esm.sh/@blocknote/mantine@0.15.11"
      }
    }
    </script>
    <link rel="stylesheet" href="https://esm.sh/@blocknote/mantine@0.15.11/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        #editor-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .editor-header h1 {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }

        .save-status {
            font-size: 14px;
            color: #666;
        }

        .save-status.saved {
            color: #4CAF50;
        }

        .save-status.error {
            color: #f44336;
        }

        #editor {
            flex: 1;
            background: white;
            overflow-y: auto;
        }

        .bn-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }
    </style>
</head>
<body>
    <div id="editor-container">
        <div class="editor-header">
            <h1>BlockNote Editor</h1>
            <span id="saveStatus" class="save-status">Ready</span>
        </div>
        <div id="editor"></div>
    </div>

    <script type="module" src="dist/main.js"></script>
</body>
</html>
